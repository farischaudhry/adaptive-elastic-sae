experiment:
  name: llm_llama8b_ghost_grad_baseline
  seeds: [0]

data:
  # Llama-3.1-8B hidden dimension at layer 16 is 4096. 
  # 32x expansion: 4096 * 32 = 131072
  d_dict: 131072

  train:
    # Requires HF auth and model access.
    tl_model_name: meta-llama/Llama-3.1-8B
    hf_tokenizer_name: meta-llama/Llama-3.1-8B
    dataset_name: EleutherAI/the_pile_deduplicated
    dataset_split: train
    text_field: text
    hook_layer: 16
    seq_len: 128
    lm_batch_size: 16
    streaming: true
    skip_docs: 50000
    take_docs: null
    loop_dataset: true
    activation_normalization: per_token_l2

  validation_online:
    dataset_split: train
    skip_docs: 20000
    take_docs: 30000
    loop_dataset: true

  validation_final:
    dataset_split: train
    skip_docs: 0
    take_docs: 20000
    loop_dataset: false

training:
  num_steps: 200000
  batch_size: 4096  # 200k steps * 4k tokens = 800m tokens
  learning_rate: 5.0e-4
  warmup_steps: 4000
  log_interval: 100
  enable_validation: true
  online_validation_enabled: true
  validation_log_interval: 1000
  geometry_log_interval: 1000
  validation_num_batches: 100
  final_validation_enabled: true
  device: cuda
  dtype: float32
  model_dtype: bfloat16

models:
  ghost_grad_baseline:
    class_name: GhostVanillaSAE
    lambda_1: [0.01, 0.005, 0.001, 0.0005, 0.0001]
    ghost_scale: 0.1 
    persistent_dead_threshold: 1.0e-6
    ghost_activation: "softplus"
    firing_ema_beta: 0.9999
    min_steps_before_ghost: 2000

wandb:
  enabled: true
  project: aen-sae-llm-llama8b
  entity: farischaudhry-imperial-college-london
  tags:
    - llama-8b
    - baseline-ghost-grad

checkpoint:
  enabled: true
  dir: checkpoints/llm_llama8b_ghost_grad
  hf_upload:
    enabled: true
    repo_id: farischaudhry/llm-llama8b-ghost-grad-checkpoints
    private: true
    path_prefix: checkpoints/llama8b_ghost_grad_baseline
    upload_final_only: true
