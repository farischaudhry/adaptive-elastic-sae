experiment:
  name: llm_pythia_test
  seeds: [0]

data:
  d_dict: 512

  train:
    tl_model_name: pythia-70m-deduped
    hf_tokenizer_name: EleutherAI/pythia-70m-deduped
    dataset_name: NeelNanda/pile-10k
    dataset_split: train
    text_field: text
    hook_layer: 3
    seq_len: 128
    lm_batch_size: 4
    streaming: true
    skip_docs: 2000
    take_docs: null
    loop_dataset: true

  validation_online:
    dataset_split: train
    skip_docs: 1000
    take_docs: 1000
    loop_dataset: true

  validation_final:
    dataset_split: train
    skip_docs: 0
    take_docs: 1000
    loop_dataset: false

training:
  num_steps: 12
  batch_size: 256
  learning_rate: 1.0e-3
  warmup_steps: 2
  log_interval: 2
  enable_validation: true
  online_validation_enabled: true
  validation_log_interval: 4
  geometry_log_interval: 6
  validation_num_batches: 5
  final_validation_num_batches: 5
  final_validation_enabled: true
  device: cuda
  dtype: float32

models:
  vanilla_l1_test:
    class_name: VanillaSAE
    lambda_1: 0.002

wandb:
  enabled: true
  project: aen-sae-llm
  entity: farischaudhry-imperial-college-london
  tags:
    - pythia-test

checkpoint:
  enabled: true
  dir: checkpoints/llm_pythia_test
