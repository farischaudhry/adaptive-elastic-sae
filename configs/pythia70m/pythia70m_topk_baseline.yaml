experiment:
  name: llm_pythia_topk_baseline
  seeds: [0, 1, 2]

data:
  # Pythia-70M hidden dimension is 512.
  # 8x expansion = 4096.
  d_dict: 4096

  train:
    tl_model_name: pythia-70m-deduped
    hf_tokenizer_name: EleutherAI/pythia-70m-deduped
    dataset_name: EleutherAI/the_pile_deduplicated
    dataset_split: train
    text_field: text
    hook_layer: 3
    seq_len: 128
    lm_batch_size: 8
    streaming: true
    skip_docs: 10000
    take_docs: null
    loop_dataset: true

  validation_online:
    dataset_split: train
    skip_docs: 5000
    take_docs: 5000
    loop_dataset: true

  validation_final:
    dataset_split: train
    skip_docs: 0
    take_docs: 5000
    loop_dataset: false

training:
  num_steps: 20000
  batch_size: 512
  learning_rate: 1.0e-3
  warmup_steps: 4000
  log_interval: 100
  enable_validation: true
  online_validation_enabled: true
  validation_log_interval: 1000
  geometry_log_interval: 1000
  validation_num_batches: 50
  final_validation_enabled: true
  device: cuda
  dtype: float32
  model_dtype: float16

models:
  topk_baseline:
    class_name: TopKSAE
    k: [8, 16, 32, 64, 128, 256]

wandb:
  enabled: true
  project: aen-sae-llm-pythia70m
  entity: farischaudhry-imperial-college-london
  tags:
    - pythia-70m
    - baseline-topk

checkpoint:
  enabled: true
  dir: checkpoints/llm_pythia_topk
