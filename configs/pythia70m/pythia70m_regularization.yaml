experiment:
  name: llm_pythia_regularization
  seeds: [0]

data:
  # Pythia-70M hidden dimension is 512.
  # 8x expansion = 4096.
  d_dict: 4096

  train:
    tl_model_name: pythia-70m-deduped
    hf_tokenizer_name: EleutherAI/pythia-70m-deduped
    dataset_name: EleutherAI/the_pile_deduplicated
    dataset_split: train
    text_field: text
    hook_layer: 3
    seq_len: 128
    lm_batch_size: 64
    streaming: true
    skip_docs: 10000
    take_docs: null
    loop_dataset: true
    activation_normalization: per_token_l2

  validation_online:
    dataset_split: train
    skip_docs: 5000
    take_docs: 5000
    loop_dataset: true

  validation_final:
    dataset_split: train
    skip_docs: 0
    take_docs: 5000
    loop_dataset: false

training:
  num_steps: 25000
  batch_size: 8192  # 25k steps * 8k tokens = 204m tokens
  learning_rate: 1.0e-3
  warmup_steps: 4000
  log_interval: 100
  enable_validation: true
  online_validation_enabled: true
  validation_log_interval: 1000
  geometry_log_interval: 1000
  validation_num_batches: 50
  validation_ablation_mode: batch_mean
  final_validation_enabled: true
  device: cuda
  dtype: float32
  model_dtype: float16

models:
  # Vanilla baseline
  vanilla_l1:
    class_name: VanillaSAE
    lambda_1: [0.05, 0.01, 0.005, 0.001, 0.0005]

  # Elastic net
  elastic_net:
    class_name: ElasticNetSAE
    lambda_1: [0.01, 0.005, 0.001]
    lambda_2: [0.005, 0.001, 0.0005, 0.0001]

  # Adaptive LASSO
  adaptive_lasso:
    class_name: AdaptiveLassoSAE
    lambda_1: [0.01, 0.005, 0.001]
    gamma: [0.5, 1.0]
    ema_beta: [0.999, 0.9999]
    weight_min: 0.01
    weight_max: 10.0
    ref_k_top_pct: [0.05, 0.01, 0.005]

  # Adaptive elastic net
  adaptive_elastic_net:
    class_name: AdaptiveElasticNetSAE
    lambda_1: [0.01, 0.005, 0.001]
    lambda_2: [0.005, 0.001, 0.0005, 0.0001]
    gamma: [0.5, 1.0]
    ema_beta: [0.999, 0.9999]
    weight_min: 0.01
    weight_max: 10.0
    ref_k_top_pct: [0.05, 0.01, 0.005]

wandb:
  enabled: true
  project: aen-sae-llm-pythia70m
  entity: farischaudhry-imperial-college-london
  tags:
    - pythia-70m
    - regularization

checkpoint:
  enabled: false
  dir: checkpoints/llm_pythia_regularization
