experiment:
  name: llm_pythia_test
  seeds: [0]

data:
  # For Pythia-70M, the hidden dimension at layer 3 is 512.
  # 8x expansion: 512 * 8 = 4096
  d_dict: 4096

  train:
    tl_model_name: pythia-70m-deduped
    hf_tokenizer_name: EleutherAI/pythia-70m-deduped
    dataset_name: NeelNanda/pile-10k
    dataset_split: train
    text_field: text
    hook_layer: 3
    seq_len: 128
    lm_batch_size: 4
    streaming: true
    skip_docs: 2000
    take_docs: null
    loop_dataset: true
    activation_normalization: per_token_l2

  validation_online:
    dataset_split: train
    skip_docs: 1000
    take_docs: 1000
    loop_dataset: true

  validation_final:
    dataset_split: train
    skip_docs: 0
    take_docs: 1000
    loop_dataset: false

training:
  num_steps: 12
  batch_size: 256
  learning_rate: 1.0e-3
  warmup_steps: 2
  log_interval: 2
  enable_validation: true
  online_validation_enabled: true
  validation_log_interval: 4
  geometry_log_interval: 6
  validation_num_batches: 5
  final_validation_num_batches: 5
  final_validation_enabled: true
  device: cuda
  dtype: float32
  model_dtype: float16

models:
  vanilla_l1_test:
    class_name: VanillaSAE
    lambda_1: 0.002

wandb:
  enabled: true
  project: aen-sae-llm-pythia70m
  entity: farischaudhry-imperial-college-london
  tags:
    - pythia-70m
    - test

checkpoint:
  enabled: true
  dir: checkpoints/llm_pythia70m_test
