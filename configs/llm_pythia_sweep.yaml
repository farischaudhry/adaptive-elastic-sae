experiment:
  name: llm_pythia_frontier_sweep
  seeds: [0]

data:
  d_dict: 4096

  train:
    tl_model_name: pythia-70m-deduped
    hf_tokenizer_name: EleutherAI/pythia-70m-deduped
    dataset_name: NeelNanda/pile-10k
    dataset_split: train
    text_field: text
    hook_layer: 3
    seq_len: 128
    lm_batch_size: 8
    streaming: true
    skip_docs: 0
    take_docs: null
    loop_dataset: true

training:
  num_steps: 10000
  batch_size: 512
  learning_rate: 1.0e-3
  warmup_steps: 2000
  log_interval: 100
  enable_validation: false
  device: cuda
  dtype: float32

models:
  # 6 runs
  vanilla_l1:
    class_name: VanillaSAE
    lambda_1: [0.0001, 0.0005, 0.001, 0.002, 0.005, 0.01]

  # 12 runs (6 lambda_1 * 2 lambda_2)
  elastic_net:
    class_name: ElasticNetSAE
    lambda_1: [0.0001, 0.0005, 0.001, 0.002, 0.005, 0.01]
    lambda_2: [0.001, 0.005]

  # 6 runs
  adaptive_lasso:
    class_name: AdaptiveLassoSAE
    lambda_1: [0.0001, 0.0005, 0.001, 0.002, 0.005, 0.01]
    gamma: 0.5
    ema_beta: 0.9999
    weight_min: 0.0  
    weight_max: 10.0
    ref_k_top_pct: 0.01

  # 12 runs
  adaptive_elastic_net:
    class_name: AdaptiveElasticNetSAE
    lambda_1: [0.0001, 0.0005, 0.001, 0.002, 0.005, 0.01]
    lambda_2: [0.001, 0.005]
    gamma: 0.5
    ema_beta: 0.9999
    weight_min: 0.0
    weight_max: 10.0
    ref_k_top_pct: 0.01

wandb:
  enabled: true
  project: aen-sae-llm
  entity: farischaudhry-imperial-college-london
  tags:
    - initial-frontier-sweep
    - pythia-70m
