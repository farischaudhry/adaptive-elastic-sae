experiment:
  name: spiked_model_high_rho
  seeds: [0, 1, 2]

data:
  n_dim: 256
  d_dict: 1024
  k_sparse: 16
  noise_std: 0.0
  allow_negative_codes: false
  rho_values: [0.9]

training:
  num_steps: 30_000
  batch_size: 256
  learning_rate: 1.0e-3
  warmup_steps: 10_000
  max_activations_window: 10_000
  log_interval: 500
  device: cuda
  dtype: float32

models:
  vanilla_l1:
    class_name: VanillaSAE
    lambda_1: 0.006

  aen_base:
    class_name: AdaptiveElasticNetSAE
    lambda_1: 0.006
    lambda_2: 0.003
    gamma: 0.5
    ema_beta: 0.9999
    weight_min: 0.1
    weight_max: 10.0
    ref_k_top_pct: 0.01

  aen_increase_l2_weight:
    class_name: AdaptiveElasticNetSAE
    lambda_1: 0.006
    lambda_2: 0.1 
    gamma: 0.5
    ema_beta: 0.9999
    weight_min: 0.1
    weight_max: 10.0
    ref_k_top_pct: 0.01

  aen_lower_max_weight:
    class_name: AdaptiveElasticNetSAE
    lambda_1: 0.006
    lambda_2: 0.003
    gamma: 0.5
    ema_beta: 0.9999
    weight_min: 0.1
    weight_max: 1.5
    ref_k_top_pct: 0.01

wandb:
  enabled: true
  project: aen-sae-mechanistic
  entity: farischaudhry-imperial-college-london
  tags:
    - experiment-1.1-extreme-rho
